services:
  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jumpin-webapi
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=sql;Database=220175;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=${RabbitMQ__Username}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - Jwt__Key=${Jwt__Key}
      - Stripe__SecretKey=${Stripe__SecretKey}
      - Stripe__PublishableKey=${Stripe__PublishableKey}
      - Stripe__WebhookSecret=${Stripe__WebhookSecret}
      - Stripe__VipPriceAmountInCents=2000
      - Stripe__Currency=bam
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__Username=${Smtp__Username}
      - Smtp__Password=${Smtp__Password}
      - Smtp__UseSsl=true
      - Smtp__SenderEmail=${Smtp__SenderEmail}
      - Smtp__SenderName=JumpIn
    ports:
      - "5194:5000"
    depends_on:
      sql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: jumpin-worker
    environment:
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=${RabbitMQ__Username}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - Smtp__Host=smtp.gmail.com
      - Smtp__Port=587
      - Smtp__Username=${Smtp__Username}
      - Smtp__Password=${Smtp__Password}
      - Smtp__UseSsl=true
      - Smtp__SenderEmail=${Smtp__SenderEmail}
      - Smtp__SenderName=JumpIn
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: jumpin-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sql:
    # Pinned to an immutable digest (SQL Server 2022) instead of a moving :latest tag.
    image: mcr.microsoft.com/mssql/server@sha256:d01cc45e6b920eff17abc60295b8748821e09b678f0fcf54959ef37406b80203
    container_name: jumpin-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1434:1433"
    volumes:
      - jumpin_mssqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C -b || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  jumpin_mssqldata:
